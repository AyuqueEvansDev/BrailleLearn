<span class="material-symbols-outlined">download</span>
                        Descargar Lección
                    </button>
</div>
</div>
<!-- Right Column: Related Videos (Bento Style) -->
<aside class="lg:col-span-4 mt-stack-lg lg:mt-0 flex flex-col gap-stack-sm">

                    Ver todo el curso

</div>

<span class="text-label-sm font-label-sm">Videos</span>

<script src="assets/js/app.js"></script>
<script>
(function() {
  // --- Course Data ---
  var COURSES = {
    'braille-basico': {
      name: 'Braille Básico',
      instructor: 'Elena Santos',
      lessons: {
        'introduccion-alfabeto': {
          title: 'Introducción al Alfabeto Braille',
          duration: '08:45',
          progress: 60,
          youtube: 'https://www.youtube.com/watch?v=dwv-Q9iBOJ4',
          background: 'https://lh3.googleusercontent.com/aida-public/AB6AXuAByJviF9o43voRr_6aCzC-1zCSODe3wkjRyJxtp7-v_ozp5Vw8IDMKa71XFcmYmqQw8F8yKB3YD589sRDoMuWF99IsgmpP-Ky_DmBUTTdo09WZgRS7G1QEDuQjnc__NqkrfOzeJH6saNJvmZratbrFTiqtFQpIhysgejulN4muBFcCdw7VR_7kzqRngYSd4sL3H_ldU9aym63sn8Q8VQVGTdNPAJLw32SNBvS8YWyZRz2mxhbJ2Z5RTQ'
        },
        'escritura-regleta': {
          title: 'Escritura con Regleta y Punzón',
          duration: '12:20',
          progress: 0,
          youtube: 'https://www.youtube.com/watch?v=Gw4LFp9YN78',
          background: 'https://lh3.googleusercontent.com/aida-public/AB6AXuDagdBHmrZt6XPYfHdPHsF_EfwPns0gjzYx9BIB9JDgzPSxYdFnKcjpHIjle9jziX1XJC3DE0PS8M6l0PC44KFqyrTxCN0QvEUG4rlPBFmd0nEQsvPWV6BjYZkiI843OddfaF54Xgl68OhjNkqU5mqS0bi6JnqHto9llG19_V50StftWn1Q8WLlX6_6RRGzUiVpRJUmSyXxSYBd37aZTfqDsYoU8bdYiu3sTshA0Zn7X2x50htrCVMr4A'
        }
      },
      related: [
        { course: 'braille-basico', lesson: 'escritura-regleta', title: 'Uso de la Regleta y el Punzón', duration: '12:05', level: 'Intermedio', module: 'Módulo 2', background: 'https://lh3.googleusercontent.com/aida-public/AB6AXuDagdBHmrZt6XPYfHdPHsF_EfwPns0gjzYx9BIB9JDgzPSxYdFnKcjpHIjle9jziX1XJC3DE0PS8M6l0PC44KFqyrTxCN0QvEUG4rlPBFmd0nEQsvPWV6BjYZkiI843OddfaF54Xgl68OhjNkqU5mqS0bi6JnqHto9llG19_V50StftWn1Q8WLlX6_6RRGzUiVpRJUmSyXxSYBd37aZTfqDsYoU8bdYiu3sTshA0Zn7X2x50htrCVMr4A' },
        { course: 'historia-braille', lesson: 'historia-digital', title: 'Historia del Braille Digital', duration: '15:40', level: 'Avanzado', module: 'Módulo 5', background: 'https://lh3.googleusercontent.com/aida-public/AB6AXuDveI_v_xuJw-aSaljsp07g3IqZsWcnICdkbn1Og0nNC5l8ip6dAtHXren4ZToeEPf7cwizcuulHKJbJdSI3Z6CQWiMJhMIrj9nu7RdaN2miLxhum0r6XQIuWIxjWAGgBCH1U-TphL1w_JBiQp6VCbq47srgzi37Ta43InlU2Cv8RpgxduhETBBlrjHuZLr9rgQcT6di5o2-1yVdkN37l4kxwMXkBgYQxHoZ-mtyrgXFIeW1z2JESILRw' }
      ]
    },
    'historia-braille': {
      name: 'Historia del Braille Digital',
      instructor: 'Carlos Mendoza',
      lessons: {
        'historia-digital': {
          title: 'Historia del Braille Digital',
          duration: '15:40',
          progress: 0,
          youtube: 'https://www.youtube.com/watch?v=-4KlIkeQNDM',
          background: 'https://lh3.googleusercontent.com/aida-public/AB6AXuDveI_v_xuJw-aSaljsp07g3IqZsWcnICdkbn1Og0nNC5l8ip6dAtHXren4ZToeEPf7cwizcuulHKJbJdSI3Z6CQWiMJhMIrj9nu7RdaN2miLxhum0r6XQIuWIxjWAGgBCH1U-TphL1w_JBiQp6VCbq47srgzi37Ta43InlU2Cv8RpgxduhETBBlrjHuZLr9rgQcT6di5o2-1yVdkN37l4kxwMXkBgYQxHoZ-mtyrgXFIeW1z2JESILRw'
        }
      },
      related: [
        { course: 'braille-basico', lesson: 'introduccion-alfabeto', title: 'Introducción al Alfabeto Braille', duration: '08:45', level: 'Principiante', module: 'Módulo 1', background: 'https://lh3.googleusercontent.com/aida-public/AB6AXuAByJviF9o43voRr_6aCzC-1zCSODe3wkjRyJxtp7-v_ozp5Vw8IDMKa71XFcmYmqQw8F8yKB3YD589sRDoMuWF99IsgmpP-Ky_DmBUTTdo09WZgRS7G1QEDuQjnc__NqkrfOzeJH6saNJvmZratbrFTiqtFQpIhysgejulN4muBFcCdw7VR_7kzqRngYSd4sL3H_ldU9aym63sn8Q8VQVGTdNPAJLw32SNBvS8YWyZRz2mxhbJ2Z5RTQ' },
        { course: 'historia-braille', lesson: 'dispositivos-tactiles', title: 'Dispositivos de Salida Táctil', duration: '15:40', level: 'Avanzado', module: 'Módulo 5', background: 'https://lh3.googleusercontent.com/aida-public/AB6AXuCyAuYpY76d2gE8youpLbhhKfVpavRcoJuOmmVHyLU4XD6Keszf73Tkq8Frm1g9R9Js71bry6Hn1QvjhlOmS3AF8vZET_kf8x9U_FKpuPvgKxXKAzp8pEhSmQZixb1e1eL3JdVEJhcvAxsZCYL1qRUOihVJ-ALTkwUjfYy7qc2p9LxyUyVr-Ylkf9ptdV6QfOvOsGvy_Uzo2SQgwHFPNfJ46WpGhaWiqdjcBf_jdkD_XpaxF-cPHCd0tg' }
      ]
    }
  };

  var DEFAULT_COURSE = 'braille-basico';
  var DEFAULT_LESSON = 'introduccion-alfabeto';

  // --- Parse URL params ---
  var params = new URLSearchParams(window.location.search);
  var courseSlug = params.get('course') || DEFAULT_COURSE;
  var lessonSlug = params.get('lesson') || DEFAULT_LESSON;
  var progressOverride = parseInt(params.get('progress'), 10);
  var youtubeUrl = params.get('youtube');

  // --- Lookup data ---
  var course = COURSES[courseSlug] || COURSES[DEFAULT_COURSE];
  var lesson = (course.lessons && course.lessons[lessonSlug]) || course.lessons[DEFAULT_LESSON];

  // --- Determine YouTube URL: prefer lesson data, fall back to query param ---
  var effectiveYoutubeUrl = lesson.youtube || youtubeUrl || null;
  var youtubeId = null;
  if (effectiveYoutubeUrl) {
    var m = effectiveYoutubeUrl.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    youtubeId = m ? m[1] : null;
  }

  var playerSection = document.querySelector('.relative.bg-primary.overflow-hidden');
  if (playerSection && youtubeId) {
    playerSection.innerHTML = '<iframe class="absolute inset-0 w-full h-full" src="https://www.youtube-nocookie.com/embed/' + youtubeId + '?autoplay=1" allow="autoplay; fullscreen" allowfullscreen style="border:0"></iframe>';
  }

  // --- Render ---
  document.title = lesson.title + ' - BrailleLearn';

  document.getElementById('lesson-title').textContent = lesson.title;
  document.getElementById('course-name').textContent = course.name;
  document.getElementById('lesson-meta').innerHTML = 'Curso: <span id="course-name">' + course.name + '</span> • Prof. ' + course.instructor;

  // Background
  var bgEl = document.getElementById('video-background');
  if (bgEl && lesson.background) {
    bgEl.style.backgroundImage = 'url(' + lesson.background + ')';
  }

  // Duration & progress
  var timeTotalEl = document.getElementById('time-total');
  if (timeTotalEl) timeTotalEl.textContent = lesson.duration;
  var pct = !isNaN(progressOverride) ? Math.min(100, Math.max(0, progressOverride)) : lesson.progress;
  var progressBarEl = document.getElementById('progress-bar');
  if (progressBarEl) progressBarEl.style.width = pct + '%';

  // Related lessons
  var relatedBox = document.getElementById('related-lessons');
  relatedBox.innerHTML = '';
  course.related.forEach(function(r) {
    var div = document.createElement('div');
    div.className = 'group flex gap-4 p-3 rounded-2xl bg-surface hover:bg-surface-container transition-all cursor-pointer border border-transparent hover:border-outline-variant shadow-sm';
    div.innerHTML =
      '<div class="relative w-32 h-20 flex-shrink-0 rounded-lg overflow-hidden bg-tertiary">' +
        '<div class="w-full h-full bg-cover bg-center" style="background-image: url(' + r.background + ')"></div>' +
        '<span class="absolute bottom-1 right-1 bg-primary/80 text-white text-[10px] px-1 rounded">' + r.duration + '</span>' +
      '</div>' +
      '<div class="flex flex-col justify-center">' +
        '<h4 class="text-body-md font-bold text-on-surface line-clamp-2 group-hover:text-secondary transition-colors">' + r.title + '</h4>' +
        '<p class="text-label-sm text-on-surface-variant">' + r.level + ' • ' + r.module + '</p>' +
      '</div>';
    div.addEventListener('click', function() {
      window.location.href = 'reproductor_leccion.html?course=' + encodeURIComponent(r.course) + '&lesson=' + encodeURIComponent(r.lesson);
    });
    relatedBox.appendChild(div);
  });

  // "Ver todo el curso" button
  document.getElementById('view-course-btn').addEventListener('click', function() {
    window.location.href = 'ejercicios_interactivos.html?course=' + encodeURIComponent(courseSlug);
  });

  // --- Micro-interactions ---
  document.querySelectorAll('button').forEach(function(btn) {
    btn.addEventListener('click', function() {
      this.classList.add('scale-95');
      setTimeout(function() { btn.classList.remove('scale-95'); }, 150);
    });
  });
})();
</script>
</body></html>
